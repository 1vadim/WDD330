<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sleep Outside | Home</title>
    <link rel="stylesheet" href="/css/style.css" />
  </head>

  <body>
    <header class="divider" id="main-header">
        </header>
    <main class="divider">
      <div class="hero">
        <img
          src="/images/banner-sm.jpg"
          srcset="images/banner-sm.jpg 500w, images/banner.jpg"
          alt="image of a high mountain lake"
        />
        <div class="logo logo--square">
          <img src="/images/noun_Tent_2517.svg" alt="tent image for logo" />
          <div>Sleep<span class="highlight">Outside</span></div>
        </div>
        <div class="mission">
          <p>
            Our mission is to provide you with everything you need to sleep
            outside comfortably at an affordable price.
          </p>
        </div>
      </div>
      <section class="category-navigation">
  <h2>Shop by Category</h2>
  <div class="category-grid">
    
    <a href="/product_listing/index.html?category=tents" class="category-card-link">
      <img src="/images/icons/category-tents.svg" alt="Tents category icon" />
      <span>Tents</span>
    </a>

    <a href="/product_listing/index.html?category=backpacks" class="category-card-link">
      <img src="/images/icons/category-backpacks.svg" alt="Backpacks category icon" />
      <span>Backpacks</span>
    </a>

    <a href="/product_listing/index.html?category=sleeping-bags" class="category-card-link">
      <img src="/images/icons/category-sleepingbags.svg" alt="Sleeping Bags category icon" />
      <span>Sleeping Bags</span>
    </a>

    <a href="/product_listing/index.html?category=hammocks" class="category-card-link">
      <img src="/images/icons/category-hammocks.svg" alt="Hammocks category icon" />
      <span>Hammocks</span>
    </a>

  </div>
</section>
      <!-- <section class="products">
        <h2>Top Products</h2>
        <ul class="product-list">
          
        </ul>
      </section> -->
    </main>
    <footer id="main-footer">
        </footer>
    <script src="./js/main.js" type="module"></script>
  </body>
</html>
