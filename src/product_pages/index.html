<!doctype html>

<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Sleep Outside | Products</title>

    <link rel="stylesheet" href="../css/style.css" />

    <script src="../js/product.js" type="module"></script>
    
  </head>

  <body>
    <header id="main-header"></header>

    <main class="divider">
  <section class="product-detail">

    <h3 id="productBrand"></h3>

    <h2 class="divider" id="productName"></h2>

    <img
      class="divider"
      id="productImage"
      src=""
      alt=""
    />

    <p class="product-card__price" id="productPrice"></p>

    <div id="productDiscountContainer"></div>

    <p class="product__color" id="productColor"></p>

    <p class="product__description" id="productDesc"></p>

    <div class="product-detail__add">
      <button id="addToCart">Add to Cart</button>
    </div>

  </section>
</main>

    <template class="product-list">
      <section class="product-card">
        <h3 id="title"></h3>

        <h2 class="divider" id="product_name"></h2>

        <img class="divider" src="" alt="" />

        <p class="product-card__price"></p>

        <p class="product__color"></p>

        <p class="product__description"></p>

        <div class="product-detail__add">
          <button id="addToCart" dataset-id="880RR">Add to Cart</button>
        </div>
      </section>
    </template>

    <footer id="main-footer"></footer>
  </body>
</html>
